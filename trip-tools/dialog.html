<!DOCTYPE html>
<html>

<head>
    <style>
        textarea {
            width: 100%;
            height: 200px;
            font-family: sans-serif;
        }

        .btn-container {
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>

<body>
    <textarea id="pasteBox" placeholder="Paste here..."></textarea>
    <div class="btn-container">
        <button id="submitBtn" onclick="processDispatch()">Process</button>
    </div>

    <script>
        function processDispatch() {
            const text = document.getElementById('pasteBox').value;

            if (!text.trim()) {
                alert("Please paste dispatch details first.");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            google.script.run
                .withSuccessHandler(function(success) {
                    if (success) {
                        btn.innerText = "Done!";
                        setTimeout(function() { google.script.host.close(); }, 800);
                    } else {
                        btn.disabled = false;
                        btn.innerText = "Process";
                    }
                })
                .withFailureHandler(function(err) {
                    alert("Error: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "Process";
                })
                .parseDispatchDetails(text);
        }
    </script>

</body>

</html>
